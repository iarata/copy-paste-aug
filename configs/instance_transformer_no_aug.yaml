defaults:
  - default
  - override /models: simple_instance_transformer
  - _self_

experiment_name: instance-transformer-no-augmentation

dataset:
  imgsz: 384
  batch_size: 4
  augmentations:
    name: disabled
    prob: 0.0

training:
  epochs: 25
  optimizer: AdamW
  lr0: 0.0001
  weight_decay: 0.0001
  log_every_n_steps: 10

evaluation:
  run_after_fit: true
  run_epoch_metrics: false
